<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Lucida Sans", sans-serif;
  font-size: 17px;
}

.grid-container {
  display: grid;
  grid-template-areas:
    'menu'
    'main';
  background-color: white;
  gap: 10px;  
}

.menu {
  grid-area: menu;
  }
  
.menu ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
}

.menu li {
  padding: 8px;
  margin-bottom: 7px;
  background-color: green;
  color: white;
}

.menu li:hover {
  background-color: white;
}
  
.content {
  grid-area: main;
}

.content > h1 {
  font-size: 30px;
  margin-bottom: 7px;
}

.content > p {
  margin-bottom: 7px;
}

@media (min-width: 600px) {
  .menu {grid-area: 2 / span 1;}
  .content {grid-area: 2 / span 4;}
}

@media (min-width: 768px) {
  .menu {grid-area: 2 / span 1;}
  .content {grid-area: 2 / span 4;}
}

</style>
</head>
<body>

<div class="grid-container">

<div class="menu">
  <ul>
    <li>about</li>
    <li>cv</li>
    <li>publications</li>
    <li>contact</li>
  </ul>
</div>

<div class="content">
  <h1>Roman M. Gutierrez</h1>

  <p>hello! i am a graduate student at the university of missouri working with <a href="https://memoryneurolab.org/">jeff johnson</a>. generally, i spend my days thinking about time and episodic memory.</p>

</div>  

</div>

</body>
</html>
